services:
  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_screening_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata                           # IST (UTC+5:30)
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                          # live-reload source
      - ./backend/uploads:/app/uploads          # persist uploaded resumes locally
      - ./backend/logger/logs:/app/logger/logs  # persist hourly log files locally
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "logger/*" --reload-exclude "uploads/*"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── React / Vite Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume_screening_frontend
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata                           # IST (UTC+5:30)
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                         # live-reload source
      - node_modules_data:/app/node_modules     # isolated node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  node_modules_data:
